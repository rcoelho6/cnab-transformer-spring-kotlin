spring:
  application:
    name: cnab-transformer

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cnab_transformer}
    username: ${DB_USERNAME:cnab_user}
    password: ${DB_PASSWORD:cnab_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # URI do Authorization Server para buscar a chave pública de validação dos tokens JWT
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:8080/realms/cnab/protocol/openid-connect/certs}

app:
  security:
    encryption:
      # Senha usada para derivar a chave AES-256 via PBKDF2. Injete via variável de ambiente em produção.
      password: ${ENCRYPTION_PASSWORD:minha-senha-secreta-de-desenvolvimento}
      # Salt hexadecimal de 16 bytes. Gere com: KeyGenerators.string().generateKey()
      # Injete via variável de ambiente em produção.
      salt: ${ENCRYPTION_SALT:deadbeefdeadbeef}
